services:
  - type: web
    name: lab-reagent-monitor
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lab-reagent-db
          property: connectionString

databases:
  - name: lab-reagent-db
    databaseName: lab_reagents
    user: lab_reagents
